<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Songbook</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,400;0,500;0,600;1,400&family=Cormorant+Infant:wght@400;600&display=swap" />
    <link rel="stylesheet" href="assets/style.css" />
  </head>
  <body>
    <nav class="top-nav">
      <a href="./">Home</a>
    </nav>
    <main>
      <h1>Songbook</h1>
<div class="song-search-wrap">
  <svg class="song-search-icon" viewBox="0 0 24 24" aria-hidden="true">
    <circle cx="10" cy="10" r="6" stroke="currentColor" stroke-width="2" fill="none" />
    <line x1="14.5" y1="14.5" x2="20" y2="20" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
  </svg>
  <input
    type="search"
    id="song-search"
    class="song-search"
    placeholder="Search titles, lyrics, notes, metadata…"
    autocomplete="off"
    aria-label="Search songs"
  />
</div>
<details class="song-filters" id="song-filter-details">
  <summary class="song-filter-summary">Filters</summary>
  <div class="filter-panel" id="filter-panel"></div>
</details>
<div class="table-print-link-wrap">
  <a id="table-print-link" class="layout-toggle" data-href-base="/list-print/" href="/list-print/">Print view →</a>
</div>
<div id="song-table-wrap" class="song-table-wrap"></div>
<p id="song-search-empty" class="song-search-empty" hidden><em>No songs match.</em></p>
<script id="filter-config" type="application/json">
{"fields": [{"key":"bop_rating","label":"Bop","valueOrder":["1","2","3","4","5"],"indexable":true},{"key":"mood","label":"Mood","valueOrder":["rousing","silly","uplifting","peaceful","spooky","sweet","melancholy","fun","badass","bawdy","sad"],"indexable":true},{"key":"genre","label":"Genre","valueOrder":["chantey","hymn","parody","kids-song","drinking-song","lullaby","spiritual","protest-song","satire"],"indexable":true},{"key":"structure","label":"Structure","valueOrder":["chorus","zipper","short-refrain","repeat-line-you-listen-for","call-and-response","2nd-4th-lines-repeat","counting","refrain-lines","no-chorus","folderol"],"indexable":true},{"key":"joiny_inny","label":"Joiny-inny","valueOrder":["very-easy","easy","moderate","hard"],"indexable":true},{"key":"known","label":"Known","valueOrder":["1","2","3","4","to-learn"],"indexable":true},{"key":"topics","label":"Topics","indexable":true},{"key":"in_nb","label":"In notebook"}]}
</script>
<script type="module" src="assets/table.js"></script>

    </main>
  </body>
</html>
