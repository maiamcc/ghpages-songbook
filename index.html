<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Songbook</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,400;0,500;0,600;1,400&family=Cormorant+Infant:wght@400;600&display=swap" />
    <link rel="stylesheet" href="assets/style.css" />
  </head>
  <body>
    <nav class="top-nav">
      <a href="./">Home</a>
    </nav>
    <main>
      <h1>Songbook</h1>
<div class="song-search-wrap">
  <svg class="song-search-icon" viewBox="0 0 24 24" aria-hidden="true">
    <circle cx="10" cy="10" r="6" stroke="currentColor" stroke-width="2" fill="none" />
    <line x1="14.5" y1="14.5" x2="20" y2="20" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
  </svg>
  <input
    type="search"
    id="song-search"
    class="song-search"
    placeholder="Search titles, lyrics, notes, metadata…"
    autocomplete="off"
    aria-label="Search songs"
  />
</div>
<ul class="song-list" id="song-list">
  
    <li data-url="/songs/bells-of-norwich/">
      <a href="songs/bells-of-norwich/">
        The Bells of Norwich<span class="alt-title"> (All Shall Be Well)</span><span class="author"> — Sydney Carter</span>
      </a>
    </li>
  
    <li data-url="/songs/cairo-town/">
      <a href="songs/cairo-town/">
        Cairo Town<span class="alt-title"> (The Roustabout Song)</span><span class="author"> — Dillon Bustin</span>
      </a>
    </li>
  
    <li data-url="/songs/davy-cross/">
      <a href="songs/davy-cross/">
        Davy Cross<span class="author"> — Paul Davenport</span>
      </a>
    </li>
  
</ul>
<p id="song-search-empty" class="song-search-empty" hidden><em>No songs match.</em></p>
<script type="module" src="assets/search.js"></script>

    </main>
  </body>
</html>
